name: InboxPilot-OpenEnv
version: "1.0.0"
description: >
  A real-world email triage and response drafting environment.
  An AI agent inspects a shared operations inbox, classifies emails,
  assigns priority, extracts key fields, routes to internal queues,
  and optionally drafts compliant replies.

tasks:
  - id: easy
    name: Easy Email Triage
    description: Single-email classification, priority, field extraction, and routing.
    difficulty: easy
    max_steps: 15
    grader:
      type: deterministic
      enabled: true

  - id: medium
    name: Medium Email Triage
    description: Triage plus constrained reply draft for a portal access issue.
    difficulty: medium
    max_steps: 20
    grader:
      type: deterministic
      enabled: true

  - id: hard
    name: Hard Inbox Triage
    description: Multi-email inbox with phishing, spam, duplicates, and step-budget pressure.
    difficulty: hard
    max_steps: 35
    grader:
      type: deterministic
      enabled: true

actions:
  - SelectEmail
  - ClassifyEmail
  - SetPriority
  - ExtractFields
  - RouteEmail
  - DraftReply
  - MarkResolved
  - RequestMoreInfo
  - FinishEpisode

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state

reward:
  type: shaped
  range: [-1.0, 1.0]
  final_score_range: [0.01, 0.99]

runtime:
  port: 7860
  sdk: docker
